# Minimal CI: install → lint → build (no real DB; Prisma needs env vars).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Dummy Postgres URLs — Prisma validates env at generate time; no server is contacted.
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public"
      SUPABASE_URL: "https://example.supabase.co"
      SUPABASE_ANON_KEY: "sb_publishable_dummy"
      SUPABASE_SERVICE_ROLE_KEY: "sb_secret_dummy"
      SUPABASE_STORAGE_BUCKET: "bwa"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
